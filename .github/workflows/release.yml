name: Release aemet-client

on:
  push:
    tags:
      - "v*"
      - "aemet-client-v*"

jobs:
  publish:
    name: Publish aemet-client to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          raw="${GITHUB_REF#refs/tags/}"
          tag="${raw#aemet-client-v}"
          tag="${tag#v}"
          pkg=$(node -p "require('./packages/aemet-client/package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag $raw does not match aemet-client package version $pkg"
            exit 1
          fi

      - name: Build
        run: pnpm --filter aemet-client build

      - name: Typecheck
        run: pnpm --filter aemet-client typecheck

      - name: Test
        run: pnpm --filter aemet-client test

      - name: Publish
        working-directory: packages/aemet-client
        run: npm publish --access public --provenance

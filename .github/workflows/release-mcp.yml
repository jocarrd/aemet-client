name: Release aemet-mcp

on:
  push:
    tags:
      - "aemet-mcp-v*"

jobs:
  publish:
    name: Publish aemet-mcp to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          raw="${GITHUB_REF#refs/tags/}"
          tag="${raw#aemet-mcp-v}"
          pkg=$(node -p "require('./packages/aemet-mcp/package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag $raw does not match aemet-mcp package version $pkg"
            exit 1
          fi

      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm --filter aemet-mcp test

      - name: Publish
        run: pnpm --filter aemet-mcp publish --access public --provenance --no-git-checks
